services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jetflight
      POSTGRES_PASSWORD: jetflight
      POSTGRES_DB: jetflight_app
    ports:
      - "5435:5432"
    volumes:
      - jetflight_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jetflight -d jetflight_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "JetFlightStr0ng123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "JetFlightStr0ng123", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  webapi:
    build:
      context: .
      dockerfile: Dockerfile.webapi
    ports:
      - "50001:8080"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: postgres://jetflight:jetflight@postgres:5432/jetflight_app
      MSSQL_DATABASE_URL: mssql://sa:JetFlightStr0ng123@sqlserver:1433/jetflight_int
      JWT_SECRET_KEY: local-dev-jwt-secret-key-32chars-min
      SEND_GRID_API_KEY: SG.local-dev-placeholder
      MOUSEFLOW_EMAIL: dev@example.com
      MOUSEFLOW_TOKEN: dev-token
      STORAGE_PATH: /app/storage
      API_URL: http://localhost:50001
      SMS_AUTH_EMAIL: dev@example.com
      SMS_AUTH_PASSWORD: dev-password

volumes:
  jetflight_postgres_data:
