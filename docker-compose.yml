services:
  agent-environment:
    build:
      context: .
      dockerfile: Dockerfile
    image: jetflight-agent-environment:latest
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      ASPNETCORE_ENVIRONMENT: Testing
    command: ["./scripts/validate.sh"]

  # Optional: run task tests after applying a fix
  task-tests:
    image: jetflight-agent-environment:latest
    profiles: ["task"]
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    command: ["./scripts/run-task-tests.sh"]
